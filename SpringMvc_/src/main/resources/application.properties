# Database configuration.
# Override any of these at deploy time with -D system properties or real
# environment variables (recommended for db.username / db.password), e.g.:
#   -Ddb.password=secret
# Never commit real production credentials into this file.
db.driverClassName=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/cse?useSSL=false&serverTimezone=UTC
db.username=root
db.password=root

# HikariCP pool tuning
db.pool.maximumPoolSize=10
db.pool.minimumIdle=2
